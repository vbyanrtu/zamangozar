<!DOCTYPE html>
<html lang="fa" dir="rtl" data-lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الفرصة تمر مر السحاب</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Vazirmatn:wght@300;400;500;600;700&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --night-1:#070b1f;
    --night-2:#141b3d;
    --night-3:#221a4a;
    --firuze:#2fb6ac;
    --firuze-glow:#5fd9cf;
    --gold:#d8b262;
    --cloud:#e9edf7;
    --text-soft:rgba(233,237,247,0.78);
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow-x:hidden;
    background:var(--night-1);
    font-family:'Vazirmatn','Cormorant Garamond',serif;
  }

  body[data-lang="en"]{
    direction:ltr;
  }

  .sky{
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse at 78% 12%, rgba(216,178,98,0.18), transparent 40%),
      linear-gradient(180deg, var(--night-1) 0%, var(--night-2) 45%, var(--night-3) 100%);
    overflow:hidden;
    z-index:0;
  }

  .stars{
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 20%, #fff, transparent),
      radial-gradient(1px 1px at 60% 10%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 80% 30%, #fff, transparent),
      radial-gradient(1px 1px at 35% 45%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 90% 60%, #fff, transparent),
      radial-gradient(1px 1px at 10% 65%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 50% 80%, #fff, transparent),
      radial-gradient(1px 1px at 70% 85%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 25% 90%, #fff, transparent);
    background-repeat:repeat;
    background-size:400px 400px;
    opacity:0.55;
    animation:twinkle 6s ease-in-out infinite alternate;
  }

  @keyframes twinkle{
    0%{opacity:0.35;}
    100%{opacity:0.7;}
  }

  .moon{
    position:absolute;
    top:9%;
    right:14%;
    width:78px;
    height:78px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #fff7e0, var(--gold) 70%);
    box-shadow:0 0 60px 18px rgba(216,178,98,0.35), 0 0 120px 40px rgba(216,178,98,0.12);
  }
  body[data-lang="en"] .moon{ right:auto; left:14%; }

  .cloud-layer{
    position:absolute;
    inset:0;
    z-index:1;
  }

  .cloud{
    position:absolute;
    opacity:0.9;
    filter:blur(0.3px);
  }

  .cloud svg{ display:block; width:100%; height:100%; }

  .c1{ top:14%; width:340px; height:90px; animation:drift 62s linear infinite; opacity:0.5;}
  .c2{ top:28%; width:260px; height:70px; animation:drift 48s linear infinite; animation-delay:-10s; opacity:0.65;}
  .c3{ top:42%; width:420px; height:110px; animation:drift 80s linear infinite; animation-delay:-30s; opacity:0.4;}
  .c4{ top:60%; width:300px; height:80px; animation:drift 55s linear infinite; animation-delay:-5s; opacity:0.55;}
  .c5{ top:73%; width:220px; height:60px; animation:drift 40s linear infinite; animation-delay:-20s; opacity:0.7;}
  .c6{ top:20%; width:180px; height:50px; animation:drift 35s linear infinite; animation-delay:-15s; opacity:0.35;}

  @keyframes drift{
    0%{ transform:translateX(-30vw); }
    100%{ transform:translateX(130vw); }
  }
  body[data-lang="en"] .cloud{ animation-direction:reverse; }

  .topbar{
    position:fixed;
    top:0; left:0; right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 28px;
    z-index:10;
  }

  .btn{
    background:rgba(233,237,247,0.08);
    border:1px solid rgba(233,237,247,0.18);
    color:var(--cloud);
    padding:9px 16px;
    border-radius:999px;
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
    backdrop-filter:blur(6px);
    display:flex;
    align-items:center;
    gap:8px;
    transition:all .25s ease;
  }
  .btn:hover{
    background:rgba(47,182,172,0.18);
    border-color:var(--firuze);
    box-shadow:0 0 18px rgba(47,182,172,0.25);
  }
  .btn:focus-visible{ outline:2px solid var(--firuze-glow); outline-offset:2px; }

  .icon{ width:16px; height:16px; flex-shrink:0; }

  .content{
    position:relative;
    z-index:5;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:110px 20px 40px;
    gap:44px;
  }

  .quote-card{
    max-width:760px;
    width:100%;
    text-align:center;
    padding:46px 38px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(233,237,247,0.06), rgba(233,237,247,0.02));
    border:1px solid rgba(233,237,247,0.12);
    box-shadow:0 30px 80px -30px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
  }

  .eyebrow{
    color:var(--firuze-glow);
    letter-spacing:0.25em;
    font-size:12px;
    text-transform:uppercase;
    font-family:'Vazirmatn',sans-serif;
    opacity:0.85;
    margin-bottom:18px;
  }

  .arabic{
    font-family:'Amiri', serif;
    font-size:clamp(26px, 4vw, 38px);
    line-height:1.9;
    color:var(--gold);
    margin:0 0 20px;
    direction:rtl;
  }

  .translation{
    font-family:'Vazirmatn', sans-serif;
    font-size:clamp(17px, 2.2vw, 21px);
    line-height:2.1;
    color:var(--text-soft);
    margin:0;
  }

  .divider{
    width:60px;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--firuze), transparent);
    margin:26px auto;
  }

  .attribution{
    font-size:14px;
    color:rgba(233,237,247,0.5);
    letter-spacing:0.05em;
  }

  .clock-panel{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  .iran-clock{
    text-align:center;
  }

  .iran-time{
    font-size:clamp(42px, 7vw, 64px);
    font-weight:600;
    color:var(--cloud);
    letter-spacing:0.04em;
    text-shadow:0 0 30px rgba(47,182,172,0.35);
    font-variant-numeric:tabular-nums;
  }

  .iran-date{
    margin-top:6px;
    color:var(--text-soft);
    font-size:15px;
    letter-spacing:0.03em;
  }

  .world-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:14px;
    max-width:820px;
  }

  .world-item{
    background:rgba(233,237,247,0.05);
    border:1px solid rgba(233,237,247,0.1);
    border-radius:14px;
    padding:12px 20px;
    min-width:120px;
    text-align:center;
  }

  .world-city{
    font-size:12px;
    color:var(--firuze-glow);
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-bottom:6px;
  }

  .world-time{
    font-size:19px;
    color:var(--cloud);
    font-variant-numeric:tabular-nums;
  }

  footer{
    position:relative;
    z-index:5;
    text-align:center;
    padding:20px;
    color:rgba(233,237,247,0.35);
    font-size:12px;
    letter-spacing:0.06em;
  }

  @media (max-width:560px){
    .topbar{ padding:16px; }
    .quote-card{ padding:32px 22px; }
    .moon{ width:52px; height:52px; top:6%; }
    .content{ padding:100px 14px 30px; gap:34px; }
  }
</style>
</head>
<body data-lang="fa">

<div class="sky">
  <div class="stars"></div>
  <div class="moon"></div>
  <div class="cloud-layer">
    <div class="cloud c1"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
    <div class="cloud c2"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
    <div class="cloud c3"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
    <div class="cloud c4"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
    <div class="cloud c5"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
    <div class="cloud c6"><svg viewBox="0 0 200 60" fill="none"><ellipse cx="60" cy="35" rx="55" ry="22" fill="#e9edf7"/><ellipse cx="110" cy="28" rx="45" ry="26" fill="#e9edf7"/><ellipse cx="150" cy="38" rx="35" ry="18" fill="#e9edf7"/></svg></div>
  </div>
</div>

<div class="topbar">
  <button class="btn" id="langBtn">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg>
    <span id="langLabel">English</span>
  </button>
  <button class="btn" id="musicBtn">
    <svg class="icon" id="musicIconOn" viewBox="0 0 24 24" fill="currentColor"><path d="M9 5v10.06A3.5 3.5 0 1 0 10.5 18V8.6l7-1.4V13a3.5 3.5 0 1 0 1.5 2.9V3z"/></svg>
    <span id="musicLabel" data-fa="پخش موسیقی" data-en="Play music">پخش موسیقی</span>
  </button>
</div>

<div class="content">
  <div class="quote-card">
    <div class="eyebrow" data-fa="سخن امام علی (ع)" data-en="A saying of Imam Ali (a.s.)">سخن امام علی (ع)</div>
    <p class="arabic">الْفُرْصَةُ تَمُرُّ مَرَّ السَّحابِ</p>
    <p class="translation" data-fa="فرصت‌ها مانند ابر می‌گذرند" data-en="Opportunities pass by like clouds.">فرصت‌ها مانند ابر می‌گذرند</p>
    <div class="divider"></div>
    <div class="attribution" data-fa="امام علی (ع)" data-en="Imam Ali (a.s.)">امام علی (ع)</div>
  </div>

  <div class="clock-panel">
    <div class="iran-clock">
      <div class="iran-time" id="iranTime">--:--:--</div>
      <div class="iran-date" id="iranDate" data-fa-label="ساعت ایران" data-en-label="Iran Time"></div>
    </div>
    <div class="world-row" id="worldRow"></div>
  </div>
</div>

<footer data-fa="غنیمت بشمار هر فرصتی را که می‌گذرد" data-en="Cherish every fleeting moment">
  غنیمت بشمار هر فرصتی را که می‌گذرد
</footer>

<script>
  const cities = [
    { fa:"تهران", en:"Tehran", tz:"Asia/Tehran" },
    { fa:"لندن", en:"London", tz:"Europe/London" },
    { fa:"نیویورک", en:"New York", tz:"America/New_York" },
    { fa:"دبی", en:"Dubai", tz:"Asia/Dubai" },
    { fa:"توکیو", en:"Tokyo", tz:"Asia/Tokyo" },
    { fa:"سیدنی", en:"Sydney", tz:"Australia/Sydney" }
  ];

  const worldRow = document.getElementById('worldRow');
  worldRow.innerHTML = cities.slice(1).map((c,i)=>`
    <div class="world-item">
      <div class="world-city" data-fa="${c.fa}" data-en="${c.en}">${c.fa}</div>
      <div class="world-time" id="wt${i}">--:--</div>
    </div>
  `).join('');

  function pad(n){ return n.toString().padStart(2,'0'); }

  function updateClocks(){
    const now = new Date();

    const iranFmt = new Intl.DateTimeFormat('en-GB', { timeZone:'Asia/Tehran', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    document.getElementById('iranTime').textContent = iranFmt.format(now);

    const lang = document.body.getAttribute('data-lang');
    const iranDateFmt = new Intl.DateTimeFormat(lang==='fa' ? 'fa-IR' : 'en-US', { timeZone:'Asia/Tehran', weekday:'long', day:'numeric', month:'long' });
    document.getElementById('iranDate').textContent = iranDateFmt.format(now);

    cities.slice(1).forEach((c,i)=>{
      const fmt = new Intl.DateTimeFormat('en-GB', { timeZone:c.tz, hour:'2-digit', minute:'2-digit', hour12:false });
      const el = document.getElementById('wt'+i);
      if(el) el.textContent = fmt.format(now);
    });
  }
  updateClocks();
  setInterval(updateClocks, 1000);

  // language toggle
  const langBtn = document.getElementById('langBtn');
  const langLabel = document.getElementById('langLabel');
  let currentLang = 'fa';

  function applyLang(lang){
    currentLang = lang;
    document.body.setAttribute('data-lang', lang);
    document.body.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
    document.documentElement.lang = lang;
    langLabel.textContent = lang === 'fa' ? 'English' : 'فارسی';

    document.querySelectorAll('[data-fa][data-en]').forEach(el=>{
      el.textContent = lang === 'fa' ? el.getAttribute('data-fa') : el.getAttribute('data-en');
    });

    const footer = document.querySelector('footer');
    footer.textContent = lang === 'fa' ? footer.getAttribute('data-fa') : footer.getAttribute('data-en');

    updateClocks();
  }

  langBtn.addEventListener('click', ()=> applyLang(currentLang === 'fa' ? 'en' : 'fa'));

  // ambient music via Web Audio API
  let audioCtx, masterGain, isPlaying = false, nodes = [];

  function startAmbient(){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);
    masterGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);

    const freqs = [130.81, 164.81, 196.00, 261.63]; // soft C major pad
    freqs.forEach((f, i)=>{
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;

      const gain = audioCtx.createGain();
      gain.gain.value = 0.9 / freqs.length;

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.06 + i * 0.02;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.15 / freqs.length;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      lfo.start();

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 900;

      osc.connect(gain);
      gain.connect(filter);
      filter.connect(masterGain);
      osc.start();

      nodes.push(osc, lfo);
    });
    isPlaying = true;
  }

  function stopAmbient(){
    if(!audioCtx) return;
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    setTimeout(()=>{
      nodes.forEach(n=>{ try{ n.stop(); }catch(e){} });
      nodes = [];
      audioCtx.close();
      audioCtx = null;
    }, 1100);
    isPlaying = false;
  }

  const musicBtn = document.getElementById('musicBtn');
  const musicLabel = document.getElementById('musicLabel');

  musicBtn.addEventListener('click', ()=>{
    if(!isPlaying){
      startAmbient();
      musicLabel.setAttribute('data-fa','توقف موسیقی');
      musicLabel.setAttribute('data-en','Pause music');
    } else {
      stopAmbient();
      musicLabel.setAttribute('data-fa','پخش موسیقی');
      musicLabel.setAttribute('data-en','Play music');
    }
    musicLabel.textContent = currentLang === 'fa' ? musicLabel.getAttribute('data-fa') : musicLabel.getAttribute('data-en');
  });

  applyLang('fa');
</script>

</body>
</html>
